  frontend:
    build:
      context: ./frontend
      target: build
    container_name: syndicate4-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 3000
    networks:
      - syndicate4
    depends_on:
      - ml_service
    restart: unless-stopped

  responder:
    build: ./responder
    container_name: syndicate4-responder
    ports:
      - "8001:8001"
    extra_hosts:
      - "host-gateway:host-gateway"
    environment:
      - ES_HOST=http://elasticsearch:9200
      - PFSENSE_URL=${PFSENSE_URL:-http://host-gateway:8080}
      - PFSENSE_API_KEY=${PFSENSE_API_KEY:-}
      - PFSENSE_ALIAS=syndicate4_blocklist
      - BLOCK_SEVERITIES=critical,high
      # CRITICAL: add your management IP here before setting DRY_RUN=false
      # e.g. NEVER_BLOCK=10.104.4.0/24,YOUR.MGMT.IP.HERE
      - NEVER_BLOCK=${NEVER_BLOCK:-10.104.4.0/24}
      - POLL_INTERVAL=10
      - DRY_RUN=${DRY_RUN:-true}
    networks:
      - syndicate4
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8001/health',timeout=3).status==200 else 1)\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

