  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: syndicate4-kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - XPACK_SECURITY_ENABLED=false
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=syndicate4encryptionkey32chars!!
      - TELEMETRY_ENABLED=false
    networks:
      - syndicate4
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5601/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  ml_service:
    build: ./ml_service
    container_name: syndicate4-ml
    ports:
      - "8000:8000"
    environment:
      - ES_HOST=http://elasticsearch:9200
      - TRAIN_INTERVAL_SECONDS=300
      - SCAN_INTERVAL_SECONDS=15
      - CONTAMINATION=0.05
      - AUTH_USERNAME=admin
      - AUTH_PASSWORD=admin
    networks:
      - syndicate4
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - mlmodels:/app/models
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

