server {
    listen 3000;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy ML API calls to avoid CORS
    location /api/ {
        proxy_pass http://ml_service:8000/;
        proxy_set_header Host $host;
        proxy_read_timeout 30s;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
